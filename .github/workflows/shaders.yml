name: Shaders (.vcs)

# Compiles this engine's stdshaders from source into .vcs shader packs.
#
# Why: the retail .vcs that ship in hl2_misc.vpk have diverged from this engine's
# shader code. lightmappedgeneric_ps20b declares 96 dynamic combos here but the
# retail file has 288, so CShaderManager divides m_nStaticIndex by the wrong number,
# misses the lookup, and falls back to combo 0 -- every world surface, prop and VGUI
# glyph gets drawn by a garbage shader variant. Both HL2 and Portal are affected;
# Portal ships no shaders of its own and loads hl2_misc.vpk's.
#
# Valve's pipeline needs shadercompile.exe (a VMPI farm tool) which nothing in this
# waf-only tree can build. scripts/shaders/vcscompile.py does the same job by driving
# the vendored dx9sdk/utilities/fxc.exe directly, so this runs with nothing but a
# checkout and Python.
on:
  workflow_dispatch:
    inputs:
      jobs_per_shader:
        description: "Parallel fxc.exe processes per shader"
        required: true
        default: "8"

jobs:
  # Gate: re-derive every shader's combo multipliers from its .fxc and diff them
  # against the pre-generated fxctmp9/*.inc -- which are what the engine's C++ was
  # actually compiled against. If this fails, the index math is wrong and any .vcs
  # produced below would be silently mis-keyed, so don't build them at all.
  validate:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate combo index math against fxctmp9/*.inc
        run: python scripts/shaders/vcscompile.py validate-inc

  compile:
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          - { src: lightmappedgeneric_ps2x.fxc,               target: lightmappedgeneric_ps20b }
          - { src: skin_ps20b.fxc,                            target: skin_ps20b }
          - { src: vertexlit_and_unlit_generic_ps2x.fxc,      target: vertexlit_and_unlit_generic_ps20b }
          - { src: vertexlit_and_unlit_generic_bump_ps2x.fxc, target: vertexlit_and_unlit_generic_bump_ps20b }
          - { src: eye_refract_ps2x.fxc,                      target: eye_refract_ps20b }
          - { src: teeth_bump_ps2x.fxc,                       target: teeth_bump_ps20b }
          - { src: refract_ps2x.fxc,                          target: refract_ps20b }
          - { src: water_ps2x.fxc,                            target: water_ps20b }
          - { src: WaterCheap_ps2x.fxc,                       target: WaterCheap_ps20b }
          - { src: sprite_ps2x.fxc,                           target: sprite_ps20b }
          - { src: cable_ps2x.fxc,                            target: cable_ps20b }
          - { src: eyes_ps2x.fxc,                             target: eyes_ps20b }
          - { src: eyes_flashlight_ps2x.fxc,                  target: eyes_flashlight_ps20b }
          - { src: teeth_ps2x.fxc,                            target: teeth_ps20b }
          - { src: teeth_flashlight_ps2x.fxc,                 target: teeth_flashlight_ps20b }
          - { src: decalmodulate_ps2x.fxc,                    target: decalmodulate_ps20b }
          - { src: lightmappedgeneric_decal_ps2x.fxc,         target: lightmappedgeneric_decal_ps20b }
          - { src: windowimposter_ps2x.fxc,                   target: windowimposter_ps20b }
          # ADDED: Static prop shaders to fix dark props
          - { src: staticprop_ps2x.fxc,                       target: staticprop_ps20b }
          - { src: staticprop_bump_ps2x.fxc,                  target: staticprop_bump_ps20b }
          - { src: staticprop_lightmapped_ps2x.fxc,           target: staticprop_lightmapped_ps20b }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile ${{ matrix.target }}
        run: |
          python scripts/shaders/vcscompile.py compile `
            "${{ matrix.src }}" "${{ matrix.target }}" `
            --jobs ${{ github.event.inputs.jobs_per_shader }} `
            --out shaderout

      - name: Verify ${{ matrix.target }}.vcs
        run: python scripts/shaders/vcscompile.py verify shaderout/shaders/fxc/${{ matrix.target }}.vcs

      - name: Show result
        run: Get-ChildItem -Recurse shaderout | Select-Object FullName,Length

      - uses: actions/upload-artifact@v4
        with:
          name: vcs-${{ matrix.target }}
          path: shaderout/shaders/fxc/${{ matrix.target }}.vcs
          if-no-files-found: error

  bundle:
    needs: compile
    runs-on: ubuntu-latest
    steps:
      - name: Collect every shader artifact
        uses: actions/download-artifact@v4
        with:
          pattern: vcs-*
          merge-multiple: true
          path: shaders/fxc

      - name: List
        run: ls -la shaders/fxc

      - uses: actions/upload-artifact@v4
        with:
          name: source-engine-shaders
          path: shaders
          if-no-files-found: error
