name: Shaders (.vcs)

# Compiles every pixel shader .fxc from stdshaders into .vcs packs.
#
# Why: The retail .vcs in hl2_misc.vpk mismatch many shaders; compiling all
# guarantees every shader (including those used by static props) matches the
# engine code. This overrides the VPK via portal/custom/.
on:
  workflow_dispatch:
    inputs:
      jobs_per_shader:
        description: "Parallel fxc.exe processes per shader"
        required: true
        default: "8"

jobs:
  # Gate: re-derive every shader's combo multipliers from its .fxc and diff them
  # against the pre-generated fxctmp9/*.inc -- if this fails, the index math is
  # wrong and any .vcs produced would be mis‑keyed.
  validate:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate combo index math against fxctmp9/*.inc
        run: python scripts/shaders/vcscompile.py validate-inc

  compile:
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 720   # increased for all shaders
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile all pixel shaders (_ps*.fxc) to _ps20b.vcs
        shell: pwsh
        run: |
          $shaderDir = "materialsystem/stdshaders"
          $outDir = "shaderout/shaders/fxc"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          Get-ChildItem -Path $shaderDir -Filter "*.fxc" | Where-Object { $_.Name -match "_ps" } | ForEach-Object {
            $base = $_.BaseName -replace '_ps\d+[a-z]?$', ''
            $target = $base + "_ps20b"
            Write-Host "Compiling $($_.Name) -> $target.vcs"
            python scripts/shaders/vcscompile.py compile `
              "$($_.FullName)" "$target" `
              --jobs ${{ github.event.inputs.jobs_per_shader }} `
              --out shaderout
          }

      - name: Verify all .vcs files
        shell: pwsh
        run: |
          Get-ChildItem -Path shaderout/shaders/fxc/*.vcs | ForEach-Object {
            Write-Host "Verifying $($_.Name)"
            python scripts/shaders/vcscompile.py verify $_.FullName
          }

      - name: Show result
        run: Get-ChildItem -Recurse shaderout | Select-Object FullName,Length

      - name: Upload all compiled shaders
        uses: actions/upload-artifact@v4
        with:
          name: source-engine-shaders-all
          path: shaderout/shaders/fxc/*.vcs
          if-no-files-found: error
